<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Property Finder - Affordable Brokerage</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-12">

    <section class="bg-gradient-to-r from-red-600 to-red-800 text-white py-12 px-4 text-center mb-6 shadow-md rounded-b-xl">
        <div class="max-w-3xl mx-auto">
            <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-semibold tracking-wider uppercase backdrop-blur-sm">
                Our Mission
            </span>
            <h1 class="text-3xl md:text-4xl font-extrabold mt-4 mb-2">
                Fair Real Estate Brokerage for Everyone
            </h1>
            <p class="text-md md:text-lg text-gray-100 max-w-2xl mx-auto leading-relaxed">
                Tired of paying a full month's rent just to find a home? We are breaking the cycle. 
                By charging a flat fee of just **₹2,000**, we save you thousands in upfront costs.
            </p>
            <div class="flex justify-center gap-6 mt-6">
                <div class="bg-white/10 backdrop-blur-sm px-5 py-3 rounded-lg text-center">
                    <p class="text-2xl font-bold">₹2,000</p>
                    <p class="text-xs text-gray-300 uppercase">Flat Brokerage</p>
                </div>
                <div class="bg-white/10 backdrop-blur-sm px-5 py-3 rounded-lg text-center border-l border-white/20">
                    <p class="text-2xl font-bold">₹14k+</p>
                    <p class="text-xs text-gray-300 uppercase">Average Savings</p>
                </div>
            </div>
        </div>
    </section>

    <div class="container mx-auto p-4 max-w-5xl">
        <div class="bg-white p-6 rounded-lg shadow-md mb-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600 mb-2">Select State</label>
                <select id="stateFilter" class="w-full border border-gray-300 rounded p-2 focus:ring focus:ring-red-200" onchange="populateCities()">
                    <option value="">Choose State</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600 mb-2">Select City</label>
                <select id="cityFilter" class="w-full border border-gray-300 rounded p-2 focus:ring focus:ring-red-200" onchange="populateAreas()">
                    <option value="">Choose City</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase text-gray-600 mb-2">Select Area</label>
                <select id="areaFilter" class="w-full border border-gray-300 rounded p-2 focus:ring focus:ring-red-200">
                    <option value="">Choose Area</option>
                </select>
            </div>
        </div>

        <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        // Replace with your Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPvjcoAxtYhjllrrhNqudUmTTzXFxX2rfU5t23kR7xUaksd6Uf60C2901EDL1VKkVD/exec';
        let propertiesData = [];

        async function fetchProperties() {
            try {
                const response = await fetch(SCRIPT_URL);
                propertiesData = await response.json();
                initFilters();
                renderProperties(propertiesData);
            } catch (error) {
                console.error("Error loading property data:", error);
            }
        }

        function initFilters() {
            const states = [...new Set(propertiesData.map(item => item.State))];
            const stateSelect = document.getElementById('stateFilter');
            
            states.forEach(state => {
                const opt = document.createElement('option');
                opt.value = state;
                opt.textContent = state;
                stateSelect.appendChild(opt);
            });
        }

        function populateCities() {
            const selectedState = document.getElementById('stateFilter').value;
            const citySelect = document.getElementById('cityFilter');
            citySelect.innerHTML = '<option value="">Choose City</option>';
            
            const filteredCities = [...new Set(propertiesData
                .filter(item => item.State === selectedState)
                .map(item => item.City))];
                
            filteredCities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });
            document.getElementById('areaFilter').innerHTML = '<option value="">Choose Area</option>';
            filterData();
        }

        function populateAreas() {
            const selectedCity = document.getElementById('cityFilter').value;
            const areaSelect = document.getElementById('areaFilter');
            areaSelect.innerHTML = '<option value="">Choose Area</option>';
            
            const filteredAreas = [...new Set(propertiesData
                .filter(item => item.City === selectedCity)
                .map(item => item.Area))];
                
            filteredAreas.forEach(area => {
                const opt = document.createElement('option');
                opt.value = area;
                opt.textContent = area;
                areaSelect.appendChild(opt);
            });
            filterData();
        }

        function filterData() {
            const state = document.getElementById('stateFilter').value;
            const city = document.getElementById('cityFilter').value;
            const area = document.getElementById('areaFilter').value;

            const filtered = propertiesData.filter(item => {
                return (!state || item.State === state) &&
                       (!city || item.City === city) &&
                       (!area || item.Area === area);
            });
            
            renderProperties(filtered);
        }

        function renderProperties(items) {
            const grid = document.getElementById('propertyGrid');
            grid.innerHTML = '';
            
            if (items.length === 0) {
                grid.innerHTML = '<p class="col-span-2 text-center text-gray-500 py-12">No properties found matching your filters.</p>';
                return;
            }

            items.forEach(p => {
                let videoId = p.YouTubeLink.split('v=')[1];
                if (videoId) {
                    const ampersandPosition = videoId.indexOf('&');
                    if (ampersandPosition !== -1) {
                        videoId = videoId.substring(0, ampersandPosition);
                    }
                } else {
                    videoId = p.YouTubeLink.split('/').pop();
                }

                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-md overflow-hidden flex flex-col border border-gray-100 transform hover:shadow-lg transition duration-300";
                
                card.innerHTML = `
                    <div class="h-56 bg-gray-200 relative">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" 
                            frameborder="0" allowfullscreen></iframe>
                        <span class="absolute top-3 right-3 bg-red-600 text-white text-xs font-extrabold px-3 py-1 rounded shadow">
                            Save ₹14,000+
                        </span>
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <div>
                            <span class="text-xs text-red-600 font-bold uppercase tracking-wider">${p.Area}, ${p.City}</span>
                            <h3 class="font-bold text-lg text-gray-800 mt-1">${p.State} Real Estate</h3>
                            <p class="text-sm text-gray-600 mt-2">Brokerage Fee: <span class="font-extrabold text-green-600">₹2,000 only</span></p>
                        </div>
                        
                        <div class="mt-auto pt-5">
                            <a href="https://wa.me/91${p.ContactNumber}?text=Hi, I am interested in property ${p.Area}, ${p.City}. I'm glad your platform keeps brokerage affordable!" 
                                target="_blank" class="block text-center w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-sm">
                                Contact Broker
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('areaFilter').addEventListener('change', filterData);
        document.addEventListener('DOMContentLoaded', fetchProperties);
    </script>
</body>
</html>
