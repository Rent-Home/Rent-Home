<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Property Finder - Affordable Brokerage</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans pb-12">

    <section class="bg-gradient-to-r from-red-600 to-red-800 text-white py-12 px-4 text-center mb-6 shadow-md rounded-b-xl">
        <div class="max-w-3xl mx-auto">
            <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-semibold tracking-wider uppercase backdrop-blur-sm">
                Our Mission
            </span>
            <h1 class="text-3xl md:text-4xl font-extrabold mt-4 mb-2">
                Fair Real Estate NO Brokerage deal for Everyone
            </h1>
            <p class="text-md md:text-lg text-gray-100 max-w-2xl mx-auto leading-relaxed">
                Tired of paying a Brokerage just to find/rent a home? We are breaking the cycle. 
                By charging a flat fee of just **₹2,000**, we save you thousands of rupees.
            </p>
            <div class="flex justify-center gap-6 mt-6">
                <div class="bg-white/10 backdrop-blur-sm px-5 py-3 rounded-lg text-center">
                    <p class="text-2xl font-bold">₹2,000</p>
                    <p class="text-xs text-gray-300 uppercase">Flat Fee</p>
                </div>
                <div class="bg-white/10 backdrop-blur-sm px-5 py-3 rounded-lg text-center border-l border-white/20">
                    <p class="text-2xl font-bold">₹8k+</p>
                    <p class="text-xs text-gray-300 uppercase">Average Savings</p>
                </div>
            </div>
        </div>
    </section>

    
<<div class="bg-white p-4 rounded-lg shadow-md mb-8 grid grid-cols-2 gap-4">
    
    <div class="flex flex-col gap-4 border-r pr-4 border-gray-100">
        <h3 class="text-[10px] font-black text-red-600 mb-1 tracking-widest uppercase">Location</h3>
        
        <div>
            <label class="block text-[9px] font-bold uppercase text-gray-500 mb-1">State</label>
            <select id="stateFilter" class="w-full border border-gray-300 rounded p-1.5 text-xs focus:ring focus:ring-red-200" onchange="populateCities()">
                <option value="">State</option>
            </select>
        </div>

        <div>
            <label class="block text-[9px] font-bold uppercase text-gray-500 mb-1">City</label>
            <select id="cityFilter" class="w-full border border-gray-300 rounded p-1.5 text-xs focus:ring focus:ring-red-200" onchange="populateAreas()">
                <option value="">City</option>
            </select>
        </div>

        <div>
            <label class="block text-[9px] font-bold uppercase text-gray-500 mb-1">Area</label>
            <select id="areaFilter" class="w-full border border-gray-300 rounded p-1.5 text-xs focus:ring focus:ring-red-200" onchange="filterData()">
                <option value="">Area</option>
            </select>
        </div>
    </div>

    <div class="flex flex-col gap-4">
        <h3 class="text-[10px] font-black text-red-600 mb-1 tracking-widest uppercase">Requirements</h3>

        <div>
            <label class="block text-[9px] font-bold uppercase text-gray-500 mb-1">Type</label>
            <select id="typeFilter" class="w-full border border-gray-300 rounded p-1.5 text-xs focus:ring focus:ring-red-200" onchange="handleTypeChange()">
                <option value="">Type</option>
            </select>
        </div>

        <div>
            <label class="block text-[9px] font-bold uppercase text-gray-500 mb-1">Purpose</label>
            <select id="listingFilter" class="w-full border border-gray-300 rounded p-1.5 text-xs focus:ring focus:ring-red-200" onchange="filterData()">
                <option value="">Purpose</option>
            </select>
        </div>

        <div>
            <label class="block text-[9px] font-bold uppercase text-gray-500 mb-1">BHK</label>
            <select id="bhkFilter" class="w-full border border-gray-300 rounded p-1.5 text-xs focus:ring focus:ring-red-200" onchange="filterData()">
                <option value="">BHK</option>
            </select>
        </div>
    </div>
</div>
        <div id="propertyGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzfntPaCoemj16wew5t28rq9cpKgPOybABI4tLuD2WMbHZcSXN4ROUhXaumuMOOq6xG/exec'; // Ensure your new URL is here
    let propertiesData = [];

    async function fetchProperties() {
        try {
            const response = await fetch(SCRIPT_URL);
            propertiesData = await response.json();
            initFilters();
            // Removed renderProperties from here so cards don't show on load
        } catch (error) {
            console.error("Error loading property data:", error);
        }
    }

  //---------------------------------------------------------------------------------------------
        // This function now pulls ALL filter options from your sheet automatically
function initFilters() {
    const populateUnique = (selectId, fieldName) => {
        const select = document.getElementById(selectId);
        if (!select) return;

        // Clear existing options to prevent duplicates on refresh
        const firstOptionText = select.options[0].text;
        select.innerHTML = `<option value="">${firstOptionText}</option>`;

        // Get unique values, remove empty ones, and sort alphabetically
        const uniqueValues = [...new Set(propertiesData.map(item => String(item[fieldName] || '').trim()))]
            .filter(v => v !== "")
            .sort();

        uniqueValues.forEach(val => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val;
            select.appendChild(opt);
        });
    };

    populateUnique('stateFilter', 'State');
    populateUnique('typeFilter', 'PropertyType');
    populateUnique('listingFilter', 'ListingType');
    populateUnique('bhkFilter', 'BHK');
}
//----------------------------------------------------------------------------------
    function populateCities() {
        const selectedState = document.getElementById('stateFilter').value;
        const citySelect = document.getElementById('cityFilter');
        const areaSelect = document.getElementById('areaFilter');
        
        citySelect.innerHTML = '<option value="">Choose City</option>';
        areaSelect.innerHTML = '<option value="">Choose Area</option>';
        
        if (selectedState) {
            const filteredCities = [...new Set(propertiesData
                .filter(item => item.State === selectedState)
                .map(item => item.City))].sort();
                
            filteredCities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });
        }
        filterData();
    }
//------------------------------------------------------------------------------
    function populateAreas() {
        const selectedState = document.getElementById('stateFilter').value;
        const selectedCity = document.getElementById('cityFilter').value;
        const areaSelect = document.getElementById('areaFilter');
        
        areaSelect.innerHTML = '<option value="">Choose Area</option>';
        
        if (selectedCity) {
            const filteredAreas = [...new Set(propertiesData
                .filter(item => item.State === selectedState && item.City === selectedCity)
                .map(item => item.Area))].sort();
                
            filteredAreas.forEach(area => {
                const opt = document.createElement('option');
                opt.value = area;
                opt.textContent = area;
                areaSelect.appendChild(opt);
            });
        }
        filterData();
    }
//-------------------------Filters the property----------------------------------
   function filterData() {
    const state = document.getElementById('stateFilter').value;
    const city = document.getElementById('cityFilter').value;
    const area = document.getElementById('areaFilter').value;
    const propType = document.getElementById('typeFilter').value;
    const listType = document.getElementById('listingFilter').value;
    const bhkType = document.getElementById('bhkFilter').value;
    
    const grid = document.getElementById('propertyGrid');

    // Strict check: No results unless all 6 filters are picked
    if (!state || !city || !area || !propType || !listType || !bhkType) {
        grid.innerHTML = '<p class="col-span-full text-center text-gray-400 py-12">Please select ALL filters (Location & Requirements) to view properties.</p>';
        return;
    }

    const filtered = propertiesData.filter(item => {
        return item.State === state &&
               item.City === city &&
               item.Area === area &&
               item.PropertyType === propType &&
               item.ListingType === listType &&
               item.BHK === bhkType;
    });
    
    renderProperties(filtered);
}
//-------------------------------------------------------------------------------
    function renderProperties(items) {
    const grid = document.getElementById('propertyGrid');
    grid.innerHTML = '';
    
    if (items.length === 0) {
        grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-12">No properties found matching these specific filters.</p>';
        return;
    }

    items.forEach(p => {
        let videoId = "";
        try {
            if (p.YouTubeLink.includes('v=')) {
                videoId = p.YouTubeLink.split('v=')[1].split('&')[0];
            } else {
                videoId = p.YouTubeLink.split('/').pop();
            }
        } catch(e) { videoId = ""; }

        const card = document.createElement('div');
        card.className = "bg-white rounded-xl shadow-md overflow-hidden flex flex-col border border-gray-100 transform hover:shadow-lg transition duration-300";
        
        // NEW: Added dynamic labels for Listing Type and BHK in the card UI
        card.innerHTML = `
            <div class="h-56 bg-gray-200 relative">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" 
                    frameborder="0" allowfullscreen></iframe>
                <div class="absolute top-3 left-3 flex flex-col gap-2">
                    <span class="bg-black/60 text-white text-[10px] px-2 py-1 rounded backdrop-blur-md uppercase font-bold">
                        ${p.ListingType || 'Property'}
                    </span>
                </div>
                <span class="absolute top-3 right-3 bg-red-600 text-white text-xs font-extrabold px-3 py-1 rounded shadow">
                    Save ₹14,000+
                </span>
            </div>
            <div class="p-5 flex flex-col flex-grow">
                <div>
                    <div class="flex justify-between items-start">
                        <span class="text-xs text-red-600 font-bold uppercase tracking-wider">${p.Area}, ${p.City}</span>
                        <span class="text-xs font-bold bg-gray-100 px-2 py-1 rounded">${p.BHK || ''} ${p.PropertyType || ''}</span>
                    </div>
                    <h3 class="font-bold text-lg text-gray-800 mt-1">${p.State} Real Estate</h3>
                    <p class="text-sm text-gray-600 mt-2"> Fee: <span class="font-extrabold text-green-600">₹2,000 only</span></p>
                </div>
                <div class="mt-auto pt-5">
                    <a href="https://wa.me/91${p.ContactNumber}?text=Hi, I am interested in the ${p.BHK} ${p.PropertyType} for ${p.ListingType} in ${p.Area}." 
                        target="_blank" class="block text-center w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-sm">
                        Contact Me
                    </a>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
    }

    // Add event listener for the final area filter
    document.getElementById('areaFilter').addEventListener('change', filterData);
    document.addEventListener('DOMContentLoaded', fetchProperties);

    //To refresh page
    document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") {
    console.log("Welcome back! Refreshing property data...");
    fetchProperties(); // This calls your existing function to get fresh data
  }
});  
        //when shop/plot selected disable the BHK filter
       function handleTypeChange() {
    const propType = document.getElementById('typeFilter').value;
    const bhkFilter = document.getElementById('bhkFilter');

    // Convert to lowercase and trim spaces to avoid case-sensitivity issues
    const selectedType = propType.toLowerCase().trim();

    if (selectedType === "shop" || selectedType === "plot") {
        bhkFilter.value = "N/A"; 
        bhkFilter.disabled = true;
        bhkFilter.classList.add('bg-gray-100', 'cursor-not-allowed', 'opacity-50');
    } else {
        bhkFilter.disabled = false;
        if (bhkFilter.value === "N/A") bhkFilter.value = "";
        bhkFilter.classList.remove('bg-gray-100', 'cursor-not-allowed', 'opacity-50');
    }

    filterData();
}
</script>
</body>
</html>
