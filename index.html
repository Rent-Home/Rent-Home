    <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZOL5oUMEs_BQnfLW2-vVZYDxmnw-QshjiVT2Lw7tXxWgVXSV0HfRhmP36aJJ9MN2m/exec'; // Ensure your new URL is here
    let propertiesData = [];

    async function fetchProperties() {
        try {
            const response = await fetch(SCRIPT_URL);
            propertiesData = await response.json();
            initFilters();
            // Removed renderProperties from here so cards don't show on load
        } catch (error) {
            console.error("Error loading property data:", error);
        }
    }

  //---------------------------------------------------------------------------------------------
        // This function now pulls ALL filter options from your sheet automatically
function initFilters() {
    const populateUnique = (selectId, fieldName) => {
        const select = document.getElementById(selectId);
        if (!select) return;

        // Clear existing options to prevent duplicates on refresh
        const firstOptionText = select.options[0].text;
        select.innerHTML = `<option value="">${firstOptionText}</option>`;

        // Get unique values, remove empty ones, and sort alphabetically
        const uniqueValues = [...new Set(propertiesData.map(item => String(item[fieldName] || '').trim()))]
            .filter(v => v !== "")
            .sort();

        uniqueValues.forEach(val => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val;
            select.appendChild(opt);
        });
    };

    populateUnique('stateFilter', 'State');
    populateUnique('typeFilter', 'PropertyType');
    populateUnique('listingFilter', 'ListingType');
    populateUnique('bhkFilter', 'BHK');
}
//----------------------------------------------------------------------------------
    function populateCities() {
        const selectedState = document.getElementById('stateFilter').value;
        const citySelect = document.getElementById('cityFilter');
        const areaSelect = document.getElementById('areaFilter');
        
        citySelect.innerHTML = '<option value="">Choose City</option>';
        areaSelect.innerHTML = '<option value="">Choose Area</option>';
        
        if (selectedState) {
            const filteredCities = [...new Set(propertiesData
                .filter(item => item.State === selectedState)
                .map(item => item.City))].sort();
                
            filteredCities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city;
                opt.textContent = city;
                citySelect.appendChild(opt);
            });
        }
        filterData();
    }
//------------------------------------------------------------------------------
    function populateAreas() {
        const selectedState = document.getElementById('stateFilter').value;
        const selectedCity = document.getElementById('cityFilter').value;
        const areaSelect = document.getElementById('areaFilter');
        
        areaSelect.innerHTML = '<option value="">Choose Area</option>';
        
        if (selectedCity) {
            const filteredAreas = [...new Set(propertiesData
                .filter(item => item.State === selectedState && item.City === selectedCity)
                .map(item => item.Area))].sort();
                
            filteredAreas.forEach(area => {
                const opt = document.createElement('option');
                opt.value = area;
                opt.textContent = area;
                areaSelect.appendChild(opt);
            });
        }
        filterData();
    }
//-------------------------Filters the property----------------------------------
   function filterData() {
    const state = document.getElementById('stateFilter').value;
    const city = document.getElementById('cityFilter').value;
    const area = document.getElementById('areaFilter').value;
    const propType = document.getElementById('typeFilter').value;
    const listType = document.getElementById('listingFilter').value;
    const bhkFilter = document.getElementById('bhkFilter');
    const bhkType = bhkFilter.value;
    
    const grid = document.getElementById('propertyGrid');

    // Logic to check if BHK is required (Disabled for Shop/Plot)
    const isBhkRequired = !(propType.toLowerCase().trim() === "shop" || propType.toLowerCase().trim() === "plot");

    // Strict validation: Don't show results until filters are picked
    if (!state || !city || !area || !propType || !listType || (isBhkRequired && !bhkType)) {
        grid.innerHTML = '<p class="col-span-full text-center text-gray-400 py-12">Please select all filters to view properties.</p>';
        return;
    }

    const filtered = propertiesData.filter(item => {
        // NEW: Status Check
        // Only show if status is exactly "Available" (case-insensitive)
        const isAvailable = item.Status && item.Status.toLowerCase().trim() === "available";
        if (!isAvailable) return false;

        // Existing Filters
        const matchesLocation = item.State === state && item.City === city && item.Area === area;
        const matchesType = item.PropertyType === propType && item.ListingType === listType;
        const matchesBhk = isBhkRequired ? (item.BHK === bhkType) : true;

        return matchesLocation && matchesType && matchesBhk;
    });
    
    renderProperties(filtered);
}

    function renderProperties(items) {
    const grid = document.getElementById('propertyGrid');
    grid.innerHTML = '';
    
    if (items.length === 0) {
        grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-12">No properties found matching these specific filters.</p>';
        return;
    }

    items.forEach(p => {
        // 1. YouTube Logic
        let videoId = "";
        try {
            if (p.YouTubeLink.includes('v=')) {
                videoId = p.YouTubeLink.split('v=')[1].split('&')[0];
            } else {
                videoId = p.YouTubeLink.split('/').pop();
            }
        } catch(e) { videoId = ""; }

        // 2. Price Translator (Handles 50L, 10k, etc.)
        const rawPrice = String(p.Price || "0").toLowerCase().trim();
        let displayPrice = "";
        if (rawPrice.includes('k')) displayPrice = parseFloat(rawPrice) + " Thousand";
        else if (rawPrice.includes('l')) displayPrice = parseFloat(rawPrice) + " Lakh";
        else if (rawPrice.includes('cr')) displayPrice = parseFloat(rawPrice) + " Crore";
        else displayPrice = Number(rawPrice).toLocaleString('en-IN');

        const isRent = (p.ListingType || '').toLowerCase().trim() === 'rent';
        const priceLabel = isRent ? ' / month' : ' (Full Price)';
        const serialNo = p.SNo || p.ID || "N/A"; 

        // 3. WhatsApp Message (Includes Price now)
        const messageText = `Hi! I am interested in Property ID: #${serialNo}. Details: ${p.BHK} ${p.PropertyType} in ${p.Area} listed at ₹${displayPrice}${priceLabel}.`;
        const encodedMsg = encodeURIComponent(messageText);

        const card = document.createElement('div');
        card.className = "bg-white rounded-xl shadow-md overflow-hidden flex flex-col border border-gray-100 transform hover:shadow-lg transition duration-300 relative";
        
        card.innerHTML = `
            <div class="h-56 bg-gray-200 relative">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" 
                    frameborder="0" allowfullscreen></iframe>
                
                <div class="absolute top-3 right-3 bg-red-600 text-white text-[10px] font-extrabold px-3 py-1 rounded shadow z-10">
                    ₹${displayPrice}${priceLabel}
                </div>

                <div class="absolute top-3 left-3 flex flex-col gap-2">
                    <span class="bg-black/60 text-white text-[10px] px-2 py-1 rounded backdrop-blur-md uppercase font-bold">
                        ${p.ListingType || 'Property'}
                    </span>
                </div>
            </div>

            <div class="p-5 flex flex-col flex-grow">
                <div>
                    <div class="flex justify-between items-start">
                        <span class="text-[10px] text-red-600 font-bold uppercase tracking-wider">
                            ${p.Area}, ${p.City} <span class="text-gray-400 font-normal">#${serialNo}</span>
                        </span>
                        <span class="text-[10px] font-bold bg-gray-100 px-2 py-1 rounded">
                            ${p.BHK || ''} ${p.PropertyType || ''}
                        </span>
                    </div>
                    
                    <h2 class="font-black text-2xl text-gray-900 mt-1 leading-tight">Real Estate</h2>
                    
                    <p class="text-sm text-gray-600 mt-2 font-medium"> 
                        Service Fee: <span class="font-extrabold text-green-600">₹2,000 only</span>
                    </p>
                </div>

                <div class="mt-auto pt-5">
                    <a href="https://wa.me/91${p.ContactNumber}?text=${encodedMsg}" 
                        target="_blank" class="block text-center w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-sm">
                        <i class="fab fa-whatsapp mr-1"></i> Contact Me
                    </a>
                </div>
            </div>
        `;
        grid.appendChild(card);
    });
}
 //----------------------------------------------------------------------------------------------------------------------       
        //when shop/plot selected disable the BHK filter
       function handleTypeChange() {
    const propType = document.getElementById('typeFilter').value;
    const bhkFilter = document.getElementById('bhkFilter');

    // Convert to lowercase and trim spaces to avoid case-sensitivity issues
    const selectedType = propType.toLowerCase().trim();

    if (selectedType === "shop" || selectedType === "plot") {
        bhkFilter.value = "N/A"; 
        bhkFilter.disabled = true;
        bhkFilter.classList.add('bg-gray-100', 'cursor-not-allowed', 'opacity-50');
    } else {
        bhkFilter.disabled = false;
        if (bhkFilter.value === "N/A") bhkFilter.value = "";
        bhkFilter.classList.remove('bg-gray-100', 'cursor-not-allowed', 'opacity-50');
    }

    filterData();
}

        //Refresh page logic
        // 1. Initial Load when the page first opens
document.addEventListener('DOMContentLoaded', fetchProperties);

// 2. Filter Trigger - When user changes the last filter
const areaFilter = document.getElementById('areaFilter');
if(areaFilter) {
    areaFilter.addEventListener('change', filterData);
}

// 3. Smart Refresh - Only refreshes if they've been away for more than 30 seconds
let lastFetchTime = Date.now();

document.addEventListener("visibilitychange", () => {
    const now = Date.now();
    // Only refresh if more than 30 seconds have passed (30000 milliseconds)
    if (document.visibilityState === "visible" && (now - lastFetchTime) > 30000) {
        console.log("Refreshing data to ensure availability...");
        fetchProperties(); 
        lastFetchTime = now;
    }
});
        
</script>
